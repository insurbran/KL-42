services:
  frontend:
    image: frontend
    pull_policy: build
    build:
      context: frontend
    ports:
      - "8000:8000"
    environment:
      - BACKEND_URL=http://localhost:8001
    depends_on:
      - backend
    networks:
      - app-network

  backend:
    image: backend
    pull_policy: build
    build:
      context: backend
    ports:
      - "8001:8001"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - OLLAMA_HOST=http://host.docker.internal:11434
      - DB_PATH=src/week_2/data/jobs_d1.db
      - RESUME_PATH=src/week_2/data/resume_d3.txt
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge